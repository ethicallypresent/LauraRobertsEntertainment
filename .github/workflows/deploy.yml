# ─────────────────────────────────────────────────────────────────────────────
#  GitHub Actions — Automatic Deploy to GitHub Pages
#
#  This workflow automatically builds and deploys the site to GitHub Pages
#  every time you push to the `main` branch.
#
#  HOW TO ENABLE:
#  1. Go to your repo on GitHub → Settings → Pages
#  2. Under "Build and deployment", set Source to "GitHub Actions"
#  3. Push any commit to `main` — this workflow will run automatically.
#
#  You can also still deploy manually with: npm run deploy
# ─────────────────────────────────────────────────────────────────────────────

name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main   # Change this if your default branch is named differently (e.g. master)
  workflow_dispatch:  # Allows manual runs from the GitHub Actions tab

# Sets the GITHUB_TOKEN permissions so the workflow can write to gh-pages
permissions:
  contents: read
  pages: write
  id-token: write

# Only allow one deployment at a time; cancel any in-progress run
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Check out the source code
      - name: Checkout
        uses: actions/checkout@v4

      # 2. Set up Node.js (match the version you use locally)
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # 3. Install dependencies
      - name: Install dependencies
        run: npm ci

      # 4. Build the production bundle (runs tsc + vite build)
      - name: Build
        run: npm run build

      # 5. Upload the built ./dist folder as a GitHub Pages artifact
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      # 6. Deploy the artifact to GitHub Pages
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
